services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: falkordb
    ports:
      - "6379:6379"
      - "3000:3000"
    volumes:
      - ./falkordb-data:/var/lib/falkordb/data
      - ./falkordb-logs:/var/lib/falkordb/logs
    environment:
      - REDIS_ARGS=--appendonly yes --loglevel verbose
      - BROWSER=1
      - TZ=America/New_York
